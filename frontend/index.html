<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>店面 · Front Desk</title>

<!-- Google Fonts：非阻塞加载——拿不到也不卡渲染，会自动 fallback 到 system-ui / serif -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;700&display=swap"
      media="print" onload="this.media='all'">

<!-- Vue 落地：走本地 /static，不依赖外网 CDN -->
<script src="/static/vue.global.prod.js"></script>

<style>
  :root {
    --paper:        #D5D2BD;
    --paper-shade:  #C7C3AB;
    --card:         #F1ECDE;
    --card-deep:    #E8E2CF;
    --ink:          #1F1A14;
    --ink-soft:     #5C5446;
    --ink-faded:    #8E8472;
    --rule:         #B8B49C;
    --accent:       #C8431A;
    --accent-deep:  #A0341A;
    --success:      #3D5234;
    --merchant:     #3D5234;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', 'Noto Serif SC', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
    background-image:
      radial-gradient(rgba(31,26,20,0.045) 1px, transparent 1px),
      radial-gradient(rgba(31,26,20,0.03)  1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1.5px 1.5px;
  }

  #app {
    position: relative; z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 28px;
  }

  header {
    padding: 60px 0 28px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }

  .shop-name {
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 144, 'wght' 700;
    font-size: clamp(48px, 7.5vw, 78px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .shop-name em {
    font-style: italic;
    font-variation-settings: 'opsz' 144, 'wght' 500;
    color: var(--accent);
    font-size: 0.7em;
    padding: 0 0.05em;
    vertical-align: 0.06em;
  }
  .shop-name span.alt {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'wght' 400;
    font-style: italic;
    letter-spacing: -0.02em;
  }

  .shop-eyebrow {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .shop-eyebrow .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(200,67,26,0.18);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(200,67,26,0.18); }
    50%      { box-shadow: 0 0 0 6px rgba(200,67,26,0.04); }
  }

  /* 登录后的"签到牌"——显示 user_id + role + 退出按钮 */
  .user-pill {
    position: absolute;
    top: 64px;
    right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    padding: 9px 12px;
    border: 1px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .user-pill .uid {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 14, 'wght' 600;
    font-size: 16px;
    color: var(--ink);
  }
  .user-pill .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    padding: 2px 6px;
    border: 1px solid var(--rule);
  }
  .user-pill .role.merchant {
    color: var(--merchant);
    border-color: var(--merchant);
  }
  .user-pill .logout {
    background: transparent;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    cursor: pointer;
    padding: 2px 4px;
  }
  .user-pill .logout:hover { color: var(--accent); }

  /* ============ 登录/注册卡片 ============ */
  .auth-card {
    margin: 50px 0;
    background: var(--card);
    border: 1px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    padding: 36px 36px 32px;
  }
  .auth-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 14px;
  }
  .auth-card h2 {
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 60, 'wght' 600;
    font-size: 28px;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }
  .auth-card h2 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: 'opsz' 60, 'wght' 500;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .auth-tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .auth-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
  }
  .field input {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 10px 14px;
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 14, 'wght' 500;
    font-size: 16px;
    color: var(--ink);
    outline: none;
  }
  .field input:focus { border-color: var(--ink); }

  .auth-submit {
    width: 100%;
    background: var(--accent);
    color: var(--card);
    border: none;
    padding: 14px;
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 14, 'wght' 600;
    font-size: 15px;
    letter-spacing: 0.06em;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    margin-top: 8px;
  }
  .auth-submit:hover { background: var(--accent-deep); }
  .auth-submit:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }
  .auth-submit:disabled {
    background: var(--card-deep);
    color: var(--ink-faded);
    box-shadow: 3px 3px 0 var(--rule);
    cursor: not-allowed;
  }

  .auth-error {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(200,67,26,0.06);
    border-left: 3px solid var(--accent);
    color: var(--accent-deep);
    font-size: 13px;
    line-height: 1.5;
  }
  .auth-hint {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    line-height: 1.6;
  }

  /* ============ Conversation ============ */
  .conversation {
    flex: 1;
    padding: 44px 0 60px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .empty {
    margin-top: 20px;
    padding: 30px 32px 32px;
    background: var(--card);
    border-top: 3px solid var(--ink);
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .empty .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 16px;
  }
  .empty h2 {
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 60, 'wght' 600;
    font-size: 28px;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .empty h2 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: 'opsz' 60, 'wght' 500;
  }
  .empty .suggestions {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .suggestions button {
    text-align: left;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--rule);
    padding: 10px 0;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    transition: color 120ms, border-color 120ms, padding-left 160ms;
  }
  .suggestions button:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
    padding-left: 6px;
  }
  .suggestions button::before {
    content: '→  ';
    color: var(--ink-faded);
    font-family: 'JetBrains Mono', monospace;
  }

  .turn-user {
    align-self: flex-end;
    max-width: 78%;
    text-align: right;
  }
  .turn-user .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 8px;
  }
  .turn-user .body {
    display: inline-block;
    text-align: left;
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    padding: 2px 16px 2px 0;
    border-right: 2px solid var(--ink);
  }

  .turn-agent {
    align-self: flex-start;
    max-width: 90%;
  }
  .turn-agent .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .turn-agent .meta::before {
    content: '';
    display: inline-block;
    width: 22px;
    height: 1px;
    background: var(--ink-faded);
  }
  .turn-agent .body {
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 36, 'wght' 450;
    font-style: italic;
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink);
    letter-spacing: -0.005em;
    white-space: pre-wrap;
  }

  .turn-loading .body {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }
  .dots::after {
    content: '·';
    animation: dots 1.5s steps(4, end) infinite;
    letter-spacing: 0.4em;
    margin-left: 0.3em;
  }
  @keyframes dots {
    0%   { content: '·'; }
    25%  { content: '· ·'; }
    50%  { content: '· · ·'; }
    75%  { content: '· · · ·'; }
    100% { content: '·'; }
  }

  .turn-error {
    align-self: stretch;
    padding: 14px 18px;
    background: rgba(200,67,26,0.06);
    border-left: 3px solid var(--accent);
    color: var(--accent-deep);
    font-size: 14px;
    line-height: 1.55;
  }
  .turn-error strong {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* ============ 下单确认 / 取消按钮（草稿 → 确认 / 取消）============ */
  .order-confirm {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
  .order-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .order-btn {
    background: var(--accent);
    color: var(--card);
    border: none;
    padding: 11px 22px;
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 14, 'wght' 600;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: background 100ms, transform 60ms, box-shadow 60ms;
  }
  .order-btn:hover { background: var(--accent-deep); }
  .order-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
  .order-btn:disabled {
    background: var(--card-deep);
    color: var(--ink-faded);
    box-shadow: 3px 3px 0 var(--rule);
    cursor: not-allowed;
  }
  /* 取消是次要操作：描边而非实心，视觉上从属于"确认" */
  .order-btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 10px 21px;
  }
  .order-btn.ghost:hover { background: var(--card-deep); }
  .order-btn.ghost:disabled {
    background: transparent;
    color: var(--ink-faded);
    border-color: var(--rule);
    box-shadow: 3px 3px 0 var(--rule);
  }
  .order-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    line-height: 1.5;
    padding: 8px 12px;
    border-left: 3px solid var(--rule);
  }
  .order-msg.ok {
    color: var(--success);
    border-left-color: var(--success);
    background: rgba(61,82,52,0.06);
  }
  .order-msg.bad {
    color: var(--accent-deep);
    border-left-color: var(--accent);
    background: rgba(200,67,26,0.06);
  }
  .order-msg.muted {
    color: var(--ink-soft);
    border-left-color: var(--ink-faded);
    background: rgba(31,26,20,0.04);
  }

  .composer {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to bottom, transparent 0, var(--paper) 28px);
    padding: 28px 0 24px;
    z-index: 2;
  }
  .composer-shell {
    position: relative;
    background: var(--card);
    border: 1px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
  }

  textarea {
    width: 100%;
    min-height: 92px;
    max-height: 220px;
    resize: none;
    border: none;
    background-color: var(--card);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 27px,
      rgba(31,26,20,0.09) 27px,
      rgba(31,26,20,0.09) 28px
    );
    background-position: 0 18px;
    padding: 18px 130px 18px 22px;
    font-family: inherit;
    font-size: 16px;
    line-height: 28px;
    color: var(--ink);
    outline: none;
    display: block;
  }
  textarea::placeholder {
    color: var(--ink-faded);
    font-style: italic;
  }
  textarea:disabled { cursor: not-allowed; opacity: 0.7; }

  .send {
    position: absolute;
    right: 12px;
    bottom: 12px;
    background: var(--accent);
    color: var(--card);
    border: none;
    padding: 13px 24px;
    font-family: 'Fraunces', 'Noto Serif SC', serif;
    font-variation-settings: 'opsz' 14, 'wght' 600;
    font-size: 15px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 100ms, transform 60ms, box-shadow 60ms;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .send:hover { background: var(--accent-deep); }
  .send:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }
  .send:disabled {
    background: var(--card-deep);
    color: var(--ink-faded);
    box-shadow: 3px 3px 0 var(--rule);
    cursor: not-allowed;
  }

  .composer-hint {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }
  .composer-hint kbd {
    font-family: 'JetBrains Mono', monospace;
    background: var(--card);
    border: 1px solid var(--rule);
    padding: 1px 6px;
    font-size: 10px;
    color: var(--ink);
  }

  @media (max-width: 600px) {
    #app { padding: 0 18px; }
    header { padding-top: 42px; }
    .shop-name { font-size: 44px; }
    .user-pill {
      position: static;
      margin-top: 20px;
      display: inline-flex;
    }
    .turn-agent .body { font-size: 18px; }
    .empty h2 { font-size: 22px; }
    .auth-card { padding: 24px; }
    .composer-hint { flex-direction: column; gap: 6px; }
    textarea { padding-right: 22px; }
    .send { position: static; width: 100%; margin: 12px 0 0; box-shadow: 3px 3px 0 var(--ink); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 class="shop-name">店面<em>·</em><span class="alt">Desk</span></h1>
    <div class="shop-eyebrow">
      <span class="dot"></span>
      <span>客服在班 · clerk on duty</span>
    </div>
    <div v-if="auth.token" class="user-pill">
      <span class="uid">{{ auth.user_id }}</span>
      <span class="role" :class="{ merchant: auth.role === 'merchant' }">{{ auth.role }}</span>
      <button class="logout" @click="logout">退出</button>
    </div>
  </header>

  <main class="conversation" ref="conv">
    <!-- 未登录：登录/注册卡片 -->
    <div v-if="!auth.token" class="auth-card">
      <div class="label">{{ mode === 'login' ? '签到 · sign in' : '开新户 · sign up' }}</div>
      <h2 v-if="mode === 'login'">欢迎回来<em>，</em>请签到。</h2>
      <h2 v-else>第一次来<em>？</em>留个账号。</h2>

      <div class="auth-tabs">
        <button class="auth-tab" :class="{ active: mode === 'login' }" @click="switchMode('login')">登录</button>
        <button class="auth-tab" :class="{ active: mode === 'register' }" @click="switchMode('register')">注册</button>
      </div>

      <!-- 错误提示放卡片顶部:401 过期被踢回登录时也走这里,用户一打开就看见 -->
      <div v-if="authError" class="auth-error">{{ authError }}</div>

      <form @submit.prevent="submitAuth">
        <div class="field">
          <label>账号</label>
          <input v-model="form.user_id" placeholder="alice" maxlength="24" autocomplete="username" spellcheck="false">
        </div>
        <div class="field">
          <label>密码</label>
          <input v-model="form.password" type="password" placeholder="至少 4 位" :autocomplete="mode === 'login' ? 'current-password' : 'new-password'">
        </div>
        <button class="auth-submit" type="submit" :disabled="!canSubmitAuth || authLoading">
          {{ authLoading ? '正在...' : (mode === 'login' ? '签到进店' : '注册并进店') }}
        </button>
        <div class="auth-hint">
          注册自动建普通用户。<br>
          商家账号由店主在 .env 配 merchant_user/merchant_password,启动时自动种。
        </div>
      </form>
    </div>

    <!-- 已登录：原来的对话 UI -->
    <template v-else>
      <div class="empty" v-if="turns.length === 0 && !loading">
        <div class="label">还没有对话 · No exchange yet</div>
        <h2 v-if="auth.role !== 'merchant'">什么都还没说呢。<br>问问看店主<em>——</em></h2>
        <h2 v-else>店主好<em>。</em>今天想改什么？</h2>
        <div class="suggestions" v-if="auth.role !== 'merchant'">
          <button @click="sendQuick('airmax 42 码有货吗？')">airmax 42 码有货吗？</button>
          <button @click="sendQuick('我 175cm 65kg，鞋穿几码？')">我 175cm 65kg，鞋穿几码？</button>
          <button @click="sendQuick('帮我下一单 airmax 42 码')">帮我下一单 airmax 42 码</button>
          <button @click="sendQuick('我的尺码记一下：42')">让店主记下我的尺码：42</button>
        </div>
        <div class="suggestions" v-else>
          <button @click="sendQuick('把 airmax 改成 799 元')">把 airmax 改成 799 元</button>
          <button @click="sendQuick('上架一个新商品：jeans，牛仔裤，下衣类，价格 299')">上架 jeans，¥299</button>
          <button @click="sendQuick('airmax 现在卖多少钱？')">airmax 现在卖多少钱？</button>
        </div>
      </div>

      <template v-for="(t, i) in turns" :key="i">
        <div v-if="t.role === 'user'" class="turn-user">
          <div class="meta">你 · {{ t.time }}</div>
          <div class="body">{{ t.text }}</div>
        </div>
        <div v-else-if="t.role === 'agent'" class="turn-agent" :class="{ 'turn-loading': t.pending }">
          <div class="meta">{{ auth.role === 'merchant' ? '助手 · merchant assistant' : '店主 · clerk' }} · {{ t.time }}</div>
          <div class="body">
            {{ t.text }}<span v-if="t.pending && t.busy !== false" class="dots"></span>
          </div>
          <!-- agent 建了草稿（带 draft_id）→ 用户独立点"确认"才真正下单、"取消"则释放预占 -->
          <div v-if="t.draftId" class="order-confirm">
            <!-- 终态（done/cancelled）后两个按钮都消失：不能再确认/取消已了结的单 -->
            <div
              v-if="t.orderState !== 'done' && t.orderState !== 'cancelled'"
              class="order-actions"
            >
              <button
                class="order-btn"
                :disabled="t.orderState === 'confirming' || t.orderState === 'cancelling'"
                @click="confirmOrder(t)"
              >
                {{ t.orderState === 'confirming' ? '确认中…' : '确认下单 #' + t.draftId }}
              </button>
              <button
                class="order-btn ghost"
                :disabled="t.orderState === 'confirming' || t.orderState === 'cancelling'"
                @click="cancelOrder(t)"
              >
                {{ t.orderState === 'cancelling' ? '取消中…' : '取消' }}
              </button>
            </div>
            <div
              v-if="t.orderMsg"
              class="order-msg"
              :class="{
                ok: t.orderState === 'done',
                bad: t.orderState === 'failed',
                muted: t.orderState === 'cancelled',
              }"
            >{{ t.orderMsg }}</div>
          </div>
        </div>
        <div v-else-if="t.role === 'error'" class="turn-error">
          <strong>线断了 · network error</strong>
          {{ t.text }}
        </div>
      </template>
    </template>
  </main>

  <div class="composer" v-if="auth.token">
    <div class="composer-shell">
      <textarea
        v-model="draft"
        placeholder="想问点什么？"
        @keydown.enter.exact.prevent="send"
        :disabled="loading"
        rows="3"
      ></textarea>
      <button class="send" @click="send" :disabled="!canSend">送出</button>
    </div>
    <div class="composer-hint">
      <span>{{ apiBase }}</span>
      <span><kbd>Enter</kbd> 送出&nbsp;·&nbsp;<kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
    </div>
  </div>
</div>

<script>
const { createApp, ref, reactive, computed, nextTick } = Vue;

createApp({
  setup() {
    const apiBase = 'http://localhost:8000';

    // ----- 认证状态 -----
    const auth = reactive(loadAuth());
    const mode = ref('login');
    const form = reactive({ user_id: '', password: '' });
    const authError = ref('');
    const authLoading = ref(false);

    function loadAuth() {
      try {
        const raw = localStorage.getItem('shop_auth');
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return { token: '', user_id: '', role: '' };
    }
    function saveAuth() {
      localStorage.setItem('shop_auth', JSON.stringify({ ...auth }));
    }
    function clearAuth() {
      auth.token = ''; auth.user_id = ''; auth.role = '';
      localStorage.removeItem('shop_auth');
    }

    const canSubmitAuth = computed(() =>
      form.user_id.trim().length > 0 && form.password.length >= 4
    );

    function switchMode(m) {
      mode.value = m;
      authError.value = '';
    }

    async function submitAuth() {
      if (!canSubmitAuth.value) return;
      authError.value = '';
      authLoading.value = true;
      try {
        const r = await fetch(apiBase + '/' + mode.value, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: form.user_id.trim(),
            password: form.password,
          }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          authError.value = data.detail || ('HTTP ' + r.status);
          return;
        }
        auth.token   = data.token;
        auth.user_id = data.user_id;
        auth.role    = data.role;
        saveAuth();
        form.password = '';
        turns.value = [];   // 切账号清旧对话
      } catch (e) {
        authError.value = e.message || String(e);
      } finally {
        authLoading.value = false;
      }
    }

    function logout() {
      clearAuth();
      turns.value = [];
    }

    // ----- 对话状态 -----
    const draft   = ref('');
    const turns   = ref([]);
    const loading = ref(false);
    const now     = ref(stamp());

    function stamp() {
      const d = new Date();
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    const canSend = computed(() =>
      auth.token && draft.value.trim() && !loading.value
    );

    function scrollDown() {
      nextTick(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }));
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function revealReply(turn, replyText) {
      const text = replyText || '(店主沉默)';
      const chars = Array.from(text);
      const batch = chars.length > 100 ? 2 : 1;
      turn.text = '';
      for (let i = 0; i < chars.length; i += batch) {
        turn.text += chars.slice(i, i + batch).join('');
        if (i % 6 === 0) scrollDown();
        await sleep(14);
      }
      scrollDown();
    }

    async function readStreamEvents(response, onEvent) {
      if (!response.body) {
        const data = await response.json();
        await onEvent({ type: 'final', reply: data.reply || '' });
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let lineEnd = buffer.indexOf('\n');
        while (lineEnd >= 0) {
          const line = buffer.slice(0, lineEnd).trim();
          buffer = buffer.slice(lineEnd + 1);
          if (line) await onEvent(JSON.parse(line));
          lineEnd = buffer.indexOf('\n');
        }
      }

      buffer += decoder.decode();
      const tail = buffer.trim();
      if (tail) await onEvent(JSON.parse(tail));
    }

    async function send() {
      if (!canSend.value) return;
      const text = draft.value.trim();
      draft.value = '';
      turns.value.push({ role: 'user', text, time: stamp() });
      const assistantTurn = {
        role: 'agent',
        text: '正在理解你的需求…',
        time: stamp(),
        pending: true,
        busy: true,
        draftId: null,        // 后端透出的草稿订单号；有值才显示"确认/取消"按钮
        orderState: 'idle',   // idle | confirming | cancelling | done | cancelled | failed
        orderMsg: '',
      };
      turns.value.push(assistantTurn);
      loading.value = true;
      now.value = stamp();
      scrollDown();
      try {
        const r = await fetch(apiBase + '/chat/stream', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + auth.token,
          },
          body: JSON.stringify({ message: text }),
        });
        if (r.status === 401) {
          // token 过期/失效：清掉,提示挂到登录卡片(不挂到对话气泡——气泡会随
          // auth.token 失效一起被 v-else 切到登录视图,提示一闪即逝)
          clearAuth();
          turns.value = [];   // 把刚 push 的 user turn 和 pending agent turn 一起清掉
          mode.value = 'login';
          authError.value = '登录已过期，请重新签到。';
          return;
        }
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          throw new Error(data.detail || ('HTTP ' + r.status + ' ' + r.statusText));
        }
        let gotFinal = false;
        let revealPromise = null;
        await readStreamEvents(r, async (event) => {
          if (event.type === 'status') {
            assistantTurn.pending = true;
            assistantTurn.busy = event.busy !== false;
            assistantTurn.text = event.text || '正在处理…';
            scrollDown();
          } else if (event.type === 'final') {
            gotFinal = true;
            assistantTurn.pending = false;
            assistantTurn.busy = false;
            // 这一轮建了草稿 → 记下 draft_id，模板据此显示"确认下单"按钮
            if (event.draft_id) assistantTurn.draftId = event.draft_id;
            // 不 await:让 reader 继续消费后续事件(若以后有的话)。
            // typewriter 自己跑,完成后由 finally 等它收尾 loading 状态。
            revealPromise = revealReply(assistantTurn, event.reply);
          } else if (event.type === 'error') {
            throw new Error(event.message || '流式响应失败');
          }
        });
        if (!gotFinal) {
          throw new Error('没有收到最终回复');
        }
        // typewriter 跑完才解除 loading,期间 send 按钮保持禁用
        if (revealPromise) await revealPromise;
      } catch (e) {
        assistantTurn.role = 'error';
        assistantTurn.text = (e && e.message) ? e.message : String(e);
        assistantTurn.pending = false;
        assistantTurn.busy = false;
      } finally {
        loading.value = false;
        scrollDown();
      }
    }

    function sendQuick(text) {
      draft.value = text;
      send();
    }

    // 操作进行中（confirming/cancelling）或已了结（done/cancelled）就不再响应点击，
    // 防重复触发。两个动作共用这一道闸。
    function orderBusyOrDone(turn) {
      return ['confirming', 'cancelling', 'done', 'cancelled'].includes(turn.orderState);
    }

    // 用户独立确认草稿订单：调绕不过的后端接口，真正扣库存只在这一步发生。
    // 不经过 agent —— 模型/前端都改变不了"必须本人带 token 确认"这件事。
    async function confirmOrder(turn) {
      if (!turn.draftId || orderBusyOrDone(turn)) return;
      turn.orderState = 'confirming';
      turn.orderMsg = '';
      try {
        const r = await fetch(apiBase + '/orders/' + turn.draftId + '/confirm', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + auth.token },
        });
        if (r.status === 401) {
          clearAuth();
          turns.value = [];
          mode.value = 'login';
          authError.value = '登录已过期，请重新签到。';
          return;
        }
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          // 越权/不存在/已过期/已取消 → 后端统一 400，detail 里有原因
          turn.orderState = 'failed';
          turn.orderMsg = data.detail || ('HTTP ' + r.status);
          return;
        }
        turn.orderState = 'done';
        turn.orderMsg = '已确认 · 订单 #' + data.order_id + ' 已生效';
      } catch (e) {
        turn.orderState = 'failed';
        turn.orderMsg = (e && e.message) ? e.message : String(e);
      }
    }

    // 取消草稿/订单：与 confirm 对称，调 /orders/{id}/cancel（后端校验归属）。
    async function cancelOrder(turn) {
      if (!turn.draftId || orderBusyOrDone(turn)) return;
      turn.orderState = 'cancelling';
      turn.orderMsg = '';
      try {
        const r = await fetch(apiBase + '/orders/' + turn.draftId + '/cancel', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + auth.token },
        });
        if (r.status === 401) {
          clearAuth();
          turns.value = [];
          mode.value = 'login';
          authError.value = '登录已过期，请重新签到。';
          return;
        }
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          turn.orderState = 'failed';
          turn.orderMsg = data.detail || ('HTTP ' + r.status);
          return;
        }
        turn.orderState = 'cancelled';
        turn.orderMsg = '已取消 · 订单 #' + data.order_id + ' 预占已释放';
      } catch (e) {
        turn.orderState = 'failed';
        turn.orderMsg = (e && e.message) ? e.message : String(e);
      }
    }

    return {
      apiBase,
      auth, mode, form, authError, authLoading, canSubmitAuth, switchMode, submitAuth, logout,
      draft, turns, loading, now, canSend, send, sendQuick, confirmOrder, cancelOrder,
    };
  }
}).mount('#app');
</script>
</body>
</html>
